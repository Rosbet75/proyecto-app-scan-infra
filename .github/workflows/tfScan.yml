name: "escaneo de archivos de terraform"
on: 
  push:
    branches:
      - main
permissions: 
  contents: read 
  id-token: write 
  issues: write 
  pull-requests: write
jobs:
  scanPipeline:
    runs-on: ubuntu-latest
    steps:
      - name: checkout de codigo
        uses: actions/checkout@v4
      
      - name: run checkov (IaC scan)
        uses: bridgecrewio/checkov-action@master
        with:
          framework: terraform
      
      # - name: trufflehog oss
      #   uses: trufflesecurity/trufflehog-main-action@main
      #   with:
      #     path: ./
      #     base: ${{ github.event.repository.default_branch }}
      - name: TruffleHog OSS 
        id: trufflehog 
        uses: trufflesecurity/trufflehog@add-actions-cli-switch 
        continue-on-error: true 
        with: 
          path: ./ 
          base: "${{ github.event.repository.default_branch }}" 
          head: HEAD 
          extra_args: --debug --only-verified
      - name: Scan Results Status 
        if: steps.trufflehog.outcome == 'failure' 
        run: exit 1
